<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js"
}
}
</script>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "three";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x001022);

let camera = new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,100);
camera.position.set(0,2,6);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.HemisphereLight(0xffffff,0x444444,1.5);
scene.add(light);

let grid = new THREE.GridHelper(20,20);
scene.add(grid);





/* ---------------- PC1 ---------------- */

let pc1 = new THREE.Mesh(
new THREE.BoxGeometry(0.8,0.5,0.6),
new THREE.MeshStandardMaterial({color:0x999999})
);

pc1.position.set(-2,0.3,0);
scene.add(pc1);


/* screen */

let screenGeo = new THREE.PlaneGeometry(0.5,0.3);
let screenMat = new THREE.MeshBasicMaterial({color:0x111111});
let screen = new THREE.Mesh(screenGeo,screenMat);

screen.position.set(-2,0.35,0.31);
scene.add(screen);



/* ---------------- PC2 ---------------- */

let pc2 = new THREE.Mesh(
new THREE.BoxGeometry(0.8,0.5,0.6),
new THREE.MeshStandardMaterial({color:0x999999})
);

pc2.position.set(2,0.3,0);
scene.add(pc2);



/* PC2 дэлгэц дээр текст */

let canvas = document.createElement("canvas");
canvas.width = 512;
canvas.height = 256;

let ctx = canvas.getContext("2d");
ctx.fillStyle="black";
ctx.fillRect(0,0,512,256);

ctx.fillStyle="lime";
ctx.font="80px Arial";
ctx.fillText("PC2",170,150);

let texture = new THREE.CanvasTexture(canvas);

let screen2 = new THREE.Mesh(
new THREE.PlaneGeometry(0.5,0.3),
new THREE.MeshBasicMaterial({map:texture})
);

screen2.position.set(2,0.35,0.31);
scene.add(screen2);





/* ---------------- PORTS ---------------- */

let port1 = new THREE.Mesh(
new THREE.BoxGeometry(0.1,0.1,0.1),
new THREE.MeshBasicMaterial({color:0x00ff00})
);

port1.position.set(-1.6,0.3,0);
scene.add(port1);


let port2 = new THREE.Mesh(
new THREE.BoxGeometry(0.1,0.1,0.1),
new THREE.MeshBasicMaterial({color:0xff0000})
);

port2.position.set(1.6,0.3,0);
scene.add(port2);





/* ---------------- CABLE ---------------- */

let cable;

function connectCable(){

let start = port1.position;
let end = port2.position;

let points = [];
points.push(start);
points.push(end);

let curve = new THREE.CatmullRomCurve3(points);

/* cable radius том болгосон */

let geo = new THREE.TubeGeometry(curve,20,0.05,12,false);

let mat = new THREE.MeshStandardMaterial({color:0xffaa00});

cable = new THREE.Mesh(geo,mat);

scene.add(cable);

}


/* автомат холбох (demo) */

setTimeout(connectCable,2000);





/* ---------------- RENDER ---------------- */

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
