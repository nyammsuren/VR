<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>router1 - Grab Plug (VR) + RAZ Green + Snap Fix</title>
  <style>
    body{margin:0; overflow:hidden; background:#111;}
    #hint{
      position:fixed; left:12px; top:12px; z-index:10;
      color:#eee; font:14px/1.35 system-ui,Segoe UI,Roboto,Arial;
      background:rgba(0,0,0,.45); padding:10px 12px; border:1px solid rgba(255,255,255,.12);
      border-radius:12px; max-width:760px;
    }
    #hint b{display:block;margin-bottom:4px}
    #hint small{opacity:.85}
    code{background:rgba(255,255,255,.08); padding:2px 6px; border-radius:8px}
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
<div id="hint">
  <b>VR Plug + RAZ Green</b>
  <small>
    • VR: Plug руу чиглүүлээд <b>trigger</b> дар → барина. Суллахад release. Ойрхон байвал snap + <b>RAZ ногоон</b>.<br/>
    • Хэт дээш snap хийвэл: <code>snapYOffset</code>-ийг өсгөнө (0.18 → 0.28).<br/>
    • “Толгой дээр” байвал: <code>rootOffset</code>-ийн y-г илүү сөрөг болго (-1.2 → -1.6).
  </small>
</div>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { VRButton } from "three/addons/webxr/VRButton.js";

/* =============================
   CONFIG (тааруулах 3 утга)
============================= */
// ✅ Толгой дээр байвал y-г илүү - болго, ойр/холыг z-р тааруул
const rootOffset = new THREE.Vector3(0.0, -1.2, -2.6);

// ✅ Snap хийх өндөр бууруулна (ихсэх тусам илүү доош сууна)
const snapYOffset = 0.18;

// ✅ Router/орчныг нэг байрлалд lock хийх эргэлт
// Ихэнхдээ доош харсан байвал X-ээр ±90° таарна.
const lockRotX = -Math.PI / 2;   // буруу бол +Math.PI/2 болгоод турш
const lockRotY = 0;             // порттой талыг өөр тийш харуулах бол Math.PI гэх мэт
const lockRotZ = 0;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 5000);
// desktop-д зориулсан байрлал (VR үед headset pose орлоно)
camera.position.set(0, 1.6, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(6, 10, 6);
scene.add(sun);

// жижиг ориентир
scene.add(new THREE.GridHelper(30, 30, 0x333333, 0x222222));

/* =============================
   Helpers
============================= */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const dragPlane = new THREE.Plane();
const hit = new THREE.Vector3();
const vA = new THREE.Vector3();
const vB = new THREE.Vector3();

function setMouse(e){
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  mouse.y = -(((e.clientY - r.top) / r.height) * 2 - 1);
}
function pick(obj, e){
  setMouse(e);
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObject(obj, true).length > 0;
}
function fitCamera(obj){
  const box = new THREE.Box3().setFromObject(obj);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(s.x,s.y,s.z);

  const fov = camera.fov * (Math.PI/180);
  let dist = (maxDim/2)/Math.tan(fov/2);
  dist *= 2.4;

  camera.position.set(c.x + dist, c.y + dist*0.55, c.z + dist);
  camera.lookAt(c);

  camera.near = Math.max(0.01, dist/200);
  camera.far  = dist*60;
  camera.updateProjectionMatrix();

  controls.target.copy(c);
  controls.update();
  return { maxDim };
}

/* =============================
   GLB state
============================= */
let root=null, plug=null, routerPort=null, razPort=null, raz=null;
let connected=false;

// Cable
let cableMesh=null;
let cableRadius=0.01;
const cableMat = new THREE.MeshStandardMaterial({
  color: 0xff6a00,
  emissive: 0xff2200,
  emissiveIntensity: 0.25,
  roughness: 0.6,
  metalness: 0.15
});

// Plug дээр “утас гардаг” local цэг
let plugCableLocal = new THREE.Vector3(0,0,-0.05);

/* =============================
   Plug material state (idle/near/connected)
============================= */
const plugMeshes = [];
function cachePlugMaterials(){
  plugMeshes.length = 0;
  plug.traverse(o=>{
    if (o.isMesh && o.material){
      plugMeshes.push(o);
      if (!o.userData.__plugOrigCached){
        const m = o.material;
        o.userData.__plugOrigCached = true;
        o.userData.__plugOrigColor = (m.color ? m.color.clone() : null);
        o.userData.__plugOrigEmissive = (m.emissive ? m.emissive.clone() : null);
        o.userData.__plugOrigEmissiveIntensity = (typeof m.emissiveIntensity === "number") ? m.emissiveIntensity : 0;
      }
    }
  });
}
function setPlugState(state){
  for (const o of plugMeshes){
    const m = o.material;
    if (!m) continue;

    if (state === "idle"){
      if (o.userData.__plugOrigColor && m.color) m.color.copy(o.userData.__plugOrigColor);
      if (o.userData.__plugOrigEmissive && m.emissive) m.emissive.copy(o.userData.__plugOrigEmissive);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = o.userData.__plugOrigEmissiveIntensity ?? 0;
      continue;
    }
    if (state === "near"){
      if (m.color) m.color.set(0xffcc00);
      if (m.emissive) m.emissive.set(0xff9900);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = 0.55;
      continue;
    }
    if (state === "connected"){
      if (m.color) m.color.set(0x00ff66);
      if (m.emissive) m.emissive.set(0x00ff66);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = 0.75;
      continue;
    }
  }
}

/* =============================
   RAZ material state (idle/connected)
   ✅ Залгаад RAZ ногоон болгоно
============================= */
const razMeshes = [];
function cacheRazMaterials(){
  razMeshes.length = 0;
  if (!raz) return;
  raz.traverse(o=>{
    if (o.isMesh && o.material){
      razMeshes.push(o);
      if (!o.userData.__razOrigCached){
        const m = o.material;
        o.userData.__razOrigCached = true;
        o.userData.__razOrigColor = (m.color ? m.color.clone() : null);
        o.userData.__razOrigEmissive = (m.emissive ? m.emissive.clone() : null);
        o.userData.__razOrigEmissiveIntensity = (typeof m.emissiveIntensity === "number") ? m.emissiveIntensity : 0;
      }
    }
  });
}
function setRAZState(state){
  for (const o of razMeshes){
    const m = o.material;
    if (!m) continue;

    if (state === "idle"){
      if (o.userData.__razOrigColor && m.color) m.color.copy(o.userData.__razOrigColor);
      if (o.userData.__razOrigEmissive && m.emissive) m.emissive.copy(o.userData.__razOrigEmissive);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = o.userData.__razOrigEmissiveIntensity ?? 0;
      continue;
    }
    if (state === "connected"){
      if (m.color) m.color.set(0x00ff66);
      if (m.emissive) m.emissive.set(0x00ff66);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = 0.75;
      continue;
    }
  }
}

/* =============================
   Positions & cable
============================= */
function getRazTargetWorld(out){
  // ✅ боломжтой бол RazPort-ыг ашиглана (илүү зөв target)
  if (razPort) return razPort.getWorldPosition(out);
  // fallback: RAZ object-ийн төв (заримдаа өндөр болж асуудал үүсгэдэг)
  if (raz) return raz.getWorldPosition(out);
  // fallback
  return root.getWorldPosition(out);
}
function getPlugCableWorld(out){
  if (!plug) return out.set(0,0,0);
  return plug.localToWorld(out.copy(plugCableLocal));
}
function updateCable(){
  if (!root || !plug || !routerPort) return;

  const start = routerPort.getWorldPosition(vA);
  const end = getPlugCableWorld(vB);

  const mid = start.clone().lerp(end, 0.5);
  mid.y -= 0.25;

  const curve = new THREE.CatmullRomCurve3([start.clone(), mid, end.clone()]);
  const tube = new THREE.TubeGeometry(curve, 70, cableRadius, 10, false);

  if (!cableMesh){
    cableMesh = new THREE.Mesh(tube, cableMat);
    scene.add(cableMesh);
  } else {
    cableMesh.geometry.dispose();
    cableMesh.geometry = tube;
  }
}

/* =============================
   Snap + Orientation
============================= */
function orientPlugTowardRaz(forceInstant=false){
  if (!plug || !root) return;
  const p = plug.getWorldPosition(vA);
  const t = getRazTargetWorld(vB);
  if (t.distanceToSquared(p) < 1e-10) return;

  const m = new THREE.Matrix4().lookAt(p, t, new THREE.Vector3(0,1,0));
  const q = new THREE.Quaternion().setFromRotationMatrix(m);
  q.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), Math.PI));

  if (forceInstant) plug.quaternion.copy(q);
  else plug.quaternion.slerp(q, 0.9);
}

function snapIfNear(){
  // ✅ targetW-г бага зэрэг ДОШЛУУЛЖ “хэт дээш үсрэх”-ийг засна
  const targetW = getRazTargetWorld(vA).clone();
  targetW.y -= snapYOffset;

  const plugW = plug.getWorldPosition(vB);
  const d = targetW.distanceTo(plugW);

  const snapDist = Math.max(0.12, cableRadius*35);

  if (d < snapDist){
    connected = true;

    const snapLocal = root.worldToLocal(targetW.clone());
    plug.position.copy(snapLocal);

    orientPlugTowardRaz(true);

    setPlugState("connected");   // plug ногоон
    setRAZState("connected");    // ✅ RAZ ногоон
  } else {
    connected = false;
    setPlugState("idle");
    setRAZState("idle");
  }
}

/* =============================
   Router orientation lock
============================= */
function lockRouterPose(){
  if (!root) return;
  root.rotation.set(0,0,0);
  root.rotateX(lockRotX);
  root.rotateY(lockRotY);
  root.rotateZ(lockRotZ);
}

/* =============================
   Load GLB
============================= */
const loader = new GLTFLoader();
loader.load("./router1.glb", (gltf)=>{
  root = gltf.scene;
  scene.add(root);

  plug = root.getObjectByName("Plug");
  routerPort = root.getObjectByName("RouterPort");
  razPort = root.getObjectByName("RazPort") || null;
  raz = root.getObjectByName("RAZ") || null;

  if (!plug) { alert('GLB дотор "Plug" алга'); return; }
  if (!routerPort) { alert('GLB дотор "RouterPort" алга'); return; }
  if (!raz && !razPort) {
    // RAZ олдохгүй байж болно, гэхдээ snap ажиллахын тулд дор хаяж RazPort эсвэл RAZ хэрэгтэй
    console.warn('Анхаар: GLB дотор "RAZ" эсвэл "RazPort" олдсонгүй (snap target алдаа гарч магадгүй).');
  }

  // center
  const box = new THREE.Box3().setFromObject(root);
  const center = box.getCenter(new THREE.Vector3());
  root.position.sub(center);

  // scale
  const len = box.getSize(new THREE.Vector3()).length();
  const targetSize = 6;
  root.scale.setScalar(targetSize / len);

  // lock orientation (router дандаа “зөв” байрлалтай)
  lockRouterPose();

  // camera fit for desktop preview
  const fit = fitCamera(root);
  cableRadius = Math.max(0.003, fit.maxDim * 0.006);

  routerPort.visible = false;
  if (razPort) razPort.visible = false;

  // plug cable local point (approx by bbox)
  const pb = new THREE.Box3().setFromObject(plug);
  const ps = pb.getSize(new THREE.Vector3());
  plugCableLocal = new THREE.Vector3(0, 0, -(ps.z * 0.55 + ps.z * 0.10));

  cachePlugMaterials();
  setPlugState("idle");

  cacheRazMaterials();
  setRAZState("idle");

  // ✅ “толгой дээр” биш: доош + урагш
  root.position.add(rootOffset);

  orientPlugTowardRaz(true);
  updateCable();
}, undefined, (e)=>console.error(e));

// VR эхлэхэд дахин баталгаатай lock + position
renderer.xr.addEventListener("sessionstart", ()=>{
  if (!root) return;
  root.position.set(rootOffset.x, rootOffset.y, rootOffset.z);
  lockRouterPose();
});

/* =============================
   Desktop drag (VR биш үед)
============================= */
let dragging=false;

renderer.domElement.addEventListener("pointerdown", (e)=>{
  if (!root || !plug) return;
  if (!pick(plug, e)) return;

  dragging=true;
  connected=false;
  controls.enabled=false;

  setPlugState("near");
  setRAZState("idle");

  const plugPos = plug.getWorldPosition(vA);
  const normal = camera.getWorldDirection(vB).normalize();
  dragPlane.setFromNormalAndCoplanarPoint(normal, plugPos);

  renderer.domElement.setPointerCapture(e.pointerId);
});

renderer.domElement.addEventListener("pointermove", (e)=>{
  if (!dragging || !root || !plug) return;

  setMouse(e);
  raycaster.setFromCamera(mouse, camera);
  if (!raycaster.ray.intersectPlane(dragPlane, hit)) return;

  const local = root.worldToLocal(hit.clone());
  plug.position.copy(local);

  orientPlugTowardRaz(false);

  const d = getRazTargetWorld(vA).distanceTo(plug.getWorldPosition(vB));
  const nearDist = Math.max(0.18, cableRadius*45);
  if (!connected) setPlugState(d < nearDist ? "near" : "idle");
});

renderer.domElement.addEventListener("pointerup", (e)=>{
  if (!dragging || !root || !plug) return;

  dragging=false;
  controls.enabled=true;

  snapIfNear();

  try{ renderer.domElement.releasePointerCapture(e.pointerId); }catch{}
});

renderer.domElement.addEventListener("pointercancel", ()=>{ dragging=false; controls.enabled=true; setPlugState("idle"); });

/* =============================
   VR: Realistic grab (attach to controller)
============================= */
const xrRaycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

const controller = renderer.xr.getController(0);
scene.add(controller);

// лазер
const laserGeom = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(0,0,-1)
]);
const laser = new THREE.Line(laserGeom, new THREE.LineBasicMaterial({ color: 0xffffff }));
laser.scale.z = 12;
controller.add(laser);

let grabbed = false;

function controllerIntersections(){
  tempMatrix.identity().extractRotation(controller.matrixWorld);
  xrRaycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  xrRaycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);
  return xrRaycaster.intersectObject(plug, true);
}

function startGrab(){
  grabbed = true;
  connected = false;
  setRAZState("idle");      // ✅ өмнөх ногооныг арилгана
  controller.attach(plug);  // ✅ бодит барих мэдрэмж
  setPlugState("near");
}

function endGrab(){
  grabbed = false;
  scene.attach(plug);

  snapIfNear();
  orientPlugTowardRaz(false);
}

controller.addEventListener("selectstart", ()=>{
  if (!root || !plug) return;
  if (grabbed) return;

  const hits = controllerIntersections();
  if (!hits.length) return;

  startGrab();
});

controller.addEventListener("selectend", ()=>{
  if (!root || !plug) return;
  if (!grabbed) return;
  endGrab();
});

/* =============================
   Resize + Loop
============================= */
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// кабель update-ийг хөнгөрүүлэх
let frame = 0;

renderer.setAnimationLoop(()=>{
  if (!renderer.xr.isPresenting) controls.update();

  const moving = dragging || grabbed;
  if (moving) {
    updateCable();
  } else {
    frame++;
    if (frame % 15 === 0) updateCable();
  }

  if (grabbed && root && plug){
    const d = getRazTargetWorld(vA).distanceTo(plug.getWorldPosition(vB));
    const nearDist = Math.max(0.18, cableRadius*45);
    setPlugState(d < nearDist ? "near" : "idle");
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
