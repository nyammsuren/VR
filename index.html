<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VR Router + Plug (PlugPort→RazPort Snap + RAZ Green)</title>

  <style>
    body{margin:0; overflow:hidden; background:#111;}
    #hud{
      position:fixed; left:12px; top:12px; z-index:10;
      color:#eee; font:14px/1.35 system-ui,Segoe UI,Roboto,Arial;
      background:rgba(0,0,0,.45); padding:10px 12px; border:1px solid rgba(255,255,255,.12);
      border-radius:12px; max-width:920px;
    }
    #hud b{display:block;margin-bottom:4px}
    #hud small{opacity:.85}
    code{background:rgba(255,255,255,.08); padding:2px 6px; border-radius:8px}
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
<div id="hud">
  <b>VR Router + Plug (All fixed)</b>
  <small>
    • <b>Trigger</b>: Plug барина/суллана<br/>
    • <b>Grip</b>: Router (бүх сүлжээ) барина/суллана<br/>
    • <b>2 controller Grip</b>: Pinch scale (томруулах/жижигрүүлэх)<br/>
    • <b>Joystick</b>: router-г нааш/цааш, хажуу тийш хөдөлгөнө<br/>
    • Snap: <b>PlugPort → RazPort</b>. Snap болсон үед <b>RAZ ногоон</b>.
  </small>
</div>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { VRButton } from "three/addons/webxr/VRButton.js";

/* =============================
   CONFIG (эндээс тааруулна)
============================= */
const rootOffset = new THREE.Vector3(0.0, -0.6, -2.6); // толгой дээр байвал y-г - болго
const lockRotX = -Math.PI/2; // router доош харвал +Math.PI/2 болгож солиод турш
const lockRotY = 0;
const lockRotZ = 0;

const moveSpeed = 0.04;          // joystick move
const minScale = 0.35, maxScale = 4.0;

// Magnet/snap ranges (scale-тэй хамт өснө)
const magnetRangeBase = 0.55;
const snapRangeBase   = 0.16;
const magnetStrength  = 0.20;

/* =============================
   Scene setup
============================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 5000);
camera.position.set(0, 1.6, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(6, 10, 6);
scene.add(sun);
scene.add(new THREE.GridHelper(30, 30, 0x333333, 0x222222));

/* =============================
   GLB state
============================= */
let root=null, plug=null, plugPort=null, routerPort=null, razPort=null, raz=null;
let plugHomeParent=null; // plug-ийг буцааж attachment хийх parent (ихэнхдээ root)
let connected=false;

// Cable
let cableMesh=null;
let cableRadius=0.01;
const cableMat = new THREE.MeshStandardMaterial({
  color: 0xff6a00,
  emissive: 0xff2200,
  emissiveIntensity: 0.25,
  roughness: 0.6,
  metalness: 0.15
});

// Helpers vectors
const vA = new THREE.Vector3();
const vB = new THREE.Vector3();
const vC = new THREE.Vector3();
const vD = new THREE.Vector3();

/* =============================
   Material state: Plug
============================= */
const plugMeshes = [];
function cachePlugMaterials(){
  plugMeshes.length = 0;
  plug.traverse(o=>{
    if (o.isMesh && o.material){
      plugMeshes.push(o);
      if (!o.userData.__plugOrigCached){
        const m = o.material;
        o.userData.__plugOrigCached = true;
        o.userData.__plugOrigMat = m;
        o.userData.__plugOrigColor = m.color ? m.color.clone() : null;
        o.userData.__plugOrigEmissive = m.emissive ? m.emissive.clone() : null;
        o.userData.__plugOrigEmissiveIntensity = (typeof m.emissiveIntensity === "number") ? m.emissiveIntensity : 0;
      }
    }
  });
}
function setPlugState(state){
  for (const o of plugMeshes){
    const m = o.material;
    if (!m) continue;

    if (state === "idle"){
      if (o.userData.__plugOrigColor && m.color) m.color.copy(o.userData.__plugOrigColor);
      if (o.userData.__plugOrigEmissive && m.emissive) m.emissive.copy(o.userData.__plugOrigEmissive);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = o.userData.__plugOrigEmissiveIntensity ?? 0;
      continue;
    }
    if (state === "near"){
      if (m.color) m.color.set(0xffcc00);
      if (m.emissive) m.emissive.set(0xff9900);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = 0.55;
      continue;
    }
    if (state === "connected"){
      if (m.color) m.color.set(0x00ff66);
      if (m.emissive) m.emissive.set(0x00ff66);
      if (typeof m.emissiveIntensity === "number") m.emissiveIntensity = 0.75;
      continue;
    }
  }
}

/* =============================
   Material state: RAZ (100% харагдах ногоон override)
============================= */
const razMeshes = [];
function cacheRazMaterials(){
  razMeshes.length = 0;
  if (!raz) return;
  raz.traverse(o=>{
    if (!o.isMesh) return;
    razMeshes.push(o);
    if (!o.userData.__razOrigCached){
      o.userData.__razOrigCached = true;
      o.userData.__razOrigMat = o.material;
    }
  });
}
function setRAZState(state){
  if (!razMeshes.length) return;

  if (state === "connected"){
    for (const m of razMeshes){
      m.material = new THREE.MeshStandardMaterial({
        color: 0x00ff66,
        emissive: 0x00ff66,
        emissiveIntensity: 0.9,
        roughness: 0.35,
        metalness: 0.05
      });
    }
  } else {
    for (const m of razMeshes){
      if (m.userData.__razOrigMat) m.material = m.userData.__razOrigMat;
    }
  }
}

/* =============================
   Pose helpers
============================= */
function lockRouterPose(){
  if (!root) return;
  root.rotation.set(0,0,0);
  root.rotateX(lockRotX);
  root.rotateY(lockRotY);
  root.rotateZ(lockRotZ);
}

function getRazPortWorld(out){
  if (!razPort) return out.set(0,0,0);
  return razPort.getWorldPosition(out);
}
function getPlugPortWorld(out){
  if (plugPort) return plugPort.getWorldPosition(out);
  // fallback: plug өөрөө
  return plug.getWorldPosition(out);
}

function updateCable(){
  if (!root || !plug || !routerPort) return;

  const start = routerPort.getWorldPosition(vA);
  const end = getPlugPortWorld(vB); // кабель PlugPort руу явж байгаа мэт

  const mid = start.clone().lerp(end, 0.5);
  mid.y -= 0.25;

  const curve = new THREE.CatmullRomCurve3([start.clone(), mid, end.clone()]);
  const tube = new THREE.TubeGeometry(curve, 70, cableRadius, 10, false);

  if (!cableMesh){
    cableMesh = new THREE.Mesh(tube, cableMat);
    scene.add(cableMesh);
  } else {
    cableMesh.geometry.dispose();
    cableMesh.geometry = tube;
  }
}

/* =============================
   Snap logic: PlugPort -> RazPort
============================= */
function computeRanges(){
  const s = root ? root.scale.x : 1;
  return {
    magnetRange: magnetRangeBase * s,
    snapRange: snapRangeBase * s
  };
}

function disconnect(){
  connected = false;
  setPlugState("idle");
  setRAZState("idle");
}

function snapPlugToRazPort(){
  if (!root || !plug) return;

  // PlugPort world -> RazPort world delta
  const targetW = getRazPortWorld(vA);
  const ppW = getPlugPortWorld(vB);

  const delta = targetW.clone().sub(ppW);

  // plug-ийн world pos дээр delta нэмээд, түүнийгээ root-ийн local руу хөрвүүлж тавина.
  const plugW = plug.getWorldPosition(vC);
  const newPlugW = plugW.clone().add(delta);

  // plug Home parent руугаа буцаасан байх шаардлагатай (controller дээр байвал snap буруу болно)
  if (plug.parent !== plugHomeParent) plugHomeParent.attach(plug);

  const local = plugHomeParent.worldToLocal(newPlugW.clone());
  plug.position.copy(local);

  connected = true;
  setPlugState("connected");
  setRAZState("connected");
}

function applyMagnet(){
  if (!root || !plug || !razPort) return;
  if (plugGrabbed || rootGrabbed || scaling) return;

  const targetW = getRazPortWorld(vA);
  const ppW = getPlugPortWorld(vB);
  const d = targetW.distanceTo(ppW);

  const { magnetRange, snapRange } = computeRanges();

  if (!connected && d < magnetRange){
    setPlugState("near");

    // PlugPort-ыг target руу ойртуулж татна
    const dir = targetW.clone().sub(ppW);
    const step = dir.multiplyScalar(magnetStrength);

    // Plug world position дээр step-г нэмнэ (PlugPort биш Plug-ийг хөдөлгөнө)
    const plugW = plug.getWorldPosition(vC);
    const newPlugW = plugW.clone().add(step);

    if (plug.parent !== plugHomeParent) plugHomeParent.attach(plug);

    const local = plugHomeParent.worldToLocal(newPlugW.clone());
    plug.position.copy(local);

    if (d < snapRange){
      snapPlugToRazPort();
    }
  }
}

/* =============================
   Load GLB
============================= */
const loader = new GLTFLoader();
loader.load("./router1.glb", (gltf)=>{
  root = gltf.scene;
  scene.add(root);

  // ✅ яг Blender дээрх нэрүүдээр нь авна
  plug      = root.getObjectByName("Plug");
  plugPort  = root.getObjectByName("PlugPort");   // ✅ энэ чухал
  routerPort= root.getObjectByName("RouterPort");
  razPort   = root.getObjectByName("RazPort");    // ✅ залгах target
  raz       = root.getObjectByName("RAZ");        // ✅ өнгө солих объект

  if (!plug)       { alert('GLB дотор "Plug" алга'); return; }
  if (!routerPort) { alert('GLB дотор "RouterPort" алга'); return; }
  if (!razPort)    { alert('GLB дотор "RazPort" алга'); return; }
  if (!plugPort)   { console.warn('Анхаар: "PlugPort" олдсонгүй. (fallback: Plug center ашиглана)'); }
  if (!raz)        { console.warn('Анхаар: "RAZ" олдсонгүй. (RAZ ногоон ажиллахгүй)'); }

  plugHomeParent = plug.parent || root;

  // center
  const box = new THREE.Box3().setFromObject(root);
  const center = box.getCenter(new THREE.Vector3());
  root.position.sub(center);

  // scale
  const len = box.getSize(new THREE.Vector3()).length();
  const targetSize = 6;
  root.scale.setScalar(targetSize / len);

  // lock orientation
  lockRouterPose();

  // place in front + down
  root.position.add(rootOffset);

  // hide helper empties if needed
  routerPort.visible = false;
  razPort.visible = false;
  if (plugPort) plugPort.visible = false;

  cachePlugMaterials();
  setPlugState("idle");

  cacheRazMaterials();
  setRAZState("idle");

  // cable thickness by size
  cableRadius = Math.max(0.003, (targetSize / 300));

  updateCable();
}, undefined, (e)=>console.error(e));

// VR session start: enforce pose
renderer.xr.addEventListener("sessionstart", ()=>{
  if (!root) return;
  root.position.set(rootOffset.x, rootOffset.y, rootOffset.z);
  lockRouterPose();
});

/* =============================
   Desktop fallback: drag plug (optional)
============================= */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const dragPlane = new THREE.Plane();
const hit = new THREE.Vector3();
let dragging=false;

function setMouse(e){
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  mouse.y = -(((e.clientY - r.top) / r.height) * 2 - 1);
}
function pick(obj, e){
  setMouse(e);
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObject(obj, true).length > 0;
}
renderer.domElement.addEventListener("pointerdown", (e)=>{
  if (!root || !plug) return;
  if (!pick(plug, e)) return;
  dragging = true;
  controls.enabled = false;
  disconnect();
  dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(vA).normalize(), plug.getWorldPosition(vB));
  renderer.domElement.setPointerCapture(e.pointerId);
});
renderer.domElement.addEventListener("pointermove", (e)=>{
  if (!dragging || !root || !plug) return;
  setMouse(e);
  raycaster.setFromCamera(mouse, camera);
  if (!raycaster.ray.intersectPlane(dragPlane, hit)) return;
  if (plug.parent !== plugHomeParent) plugHomeParent.attach(plug);
  plug.position.copy(plugHomeParent.worldToLocal(hit.clone()));
});
renderer.domElement.addEventListener("pointerup", (e)=>{
  if (!dragging) return;
  dragging=false;
  controls.enabled=true;
  try{ renderer.domElement.releasePointerCapture(e.pointerId); }catch{}
});

/* =============================
   VR controllers + interactions (ALL)
============================= */
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
scene.add(controller0);
scene.add(controller1);

function addLaser(ctrl){
  const geom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]);
  const laser = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xffffff }));
  laser.scale.z = 12;
  ctrl.add(laser);
}
addLaser(controller0);
addLaser(controller1);

const xrRaycaster = new THREE.Raycaster();
const tempMatrix = new THREE.Matrix4();

function raycastFromController(ctrl, object){
  if (!object) return [];
  tempMatrix.identity().extractRotation(ctrl.matrixWorld);
  xrRaycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  xrRaycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);
  return xrRaycaster.intersectObject(object, true);
}

// State
let plugGrabbed=false;
let rootGrabbed=false;
let scaling=false;
let scaleStartDist=0;
let scaleStartValue=1;
let isGripDown0=false;
let isGripDown1=false;

function beginScaleIfBothGrips(){
  if (!root) return;
  if (isGripDown0 && isGripDown1 && !scaling && !plugGrabbed && !rootGrabbed){
    scaling = true;
    scaleStartDist = controller0.getWorldPosition(vA).distanceTo(controller1.getWorldPosition(vB));
    scaleStartValue = root.scale.x;
  }
}
function endScaleIfNeeded(){
  if (scaling && !(isGripDown0 && isGripDown1)) scaling = false;
}

function startPlugGrab(ctrl){
  if (!root || !plug) return;
  if (plugGrabbed || rootGrabbed || scaling) return;

  disconnect();
  plugGrabbed = true;
  ctrl.attach(plug);
  setPlugState("near");
}

function endPlugGrab(){
  if (!plugGrabbed) return;
  plugGrabbed = false;

  // ✅ буцааж home parent руу
  plugHomeParent.attach(plug);

  // сулласны дараа magnet/snapping ажиллана
  setPlugState("idle");
}

function startRootGrab(ctrl){
  if (!root) return;
  if (rootGrabbed || plugGrabbed || scaling) return;

  rootGrabbed = true;
  ctrl.attach(root);
}

function endRootGrab(){
  if (!rootGrabbed) return;
  rootGrabbed = false;

  scene.attach(root);
  lockRouterPose(); // ✅ controller rotation-оос салгаад дахин lock
}

// Trigger -> plug grab
controller0.addEventListener("selectstart", ()=>{
  if (!plug) return;
  const hits = raycastFromController(controller0, plug);
  if (hits.length) startPlugGrab(controller0);
});
controller0.addEventListener("selectend", ()=> endPlugGrab());

controller1.addEventListener("selectstart", ()=>{
  if (!plug) return;
  const hits = raycastFromController(controller1, plug);
  if (hits.length) startPlugGrab(controller1);
});
controller1.addEventListener("selectend", ()=> endPlugGrab());

// Grip -> root grab OR pinch scale
controller0.addEventListener("squeezestart", ()=>{
  isGripDown0 = true;
  beginScaleIfBothGrips();
  if (!scaling) startRootGrab(controller0);
});
controller0.addEventListener("squeezeend", ()=>{
  isGripDown0 = false;
  endRootGrab();
  endScaleIfNeeded();
});

controller1.addEventListener("squeezestart", ()=>{
  isGripDown1 = true;
  beginScaleIfBothGrips();
  if (!scaling) startRootGrab(controller1);
});
controller1.addEventListener("squeezeend", ()=>{
  isGripDown1 = false;
  endRootGrab();
  endScaleIfNeeded();
});

function updateScale(){
  if (!scaling || !root) return;
  const dist = controller0.getWorldPosition(vA).distanceTo(controller1.getWorldPosition(vB));
  if (scaleStartDist < 1e-6) return;
  const factor = dist / scaleStartDist;
  const newScale = THREE.MathUtils.clamp(scaleStartValue * factor, minScale, maxScale);
  root.scale.setScalar(newScale);
  lockRouterPose();
}

function applyJoystickMove(){
  if (!root) return;
  if (rootGrabbed || scaling) return;

  const session = renderer.xr.getSession?.();
  if (!session) return;

  for (const src of session.inputSources){
    if (!src.gamepad) continue;
    const axes = src.gamepad.axes;

    let ax = 0, ay = 0;
    if (axes.length >= 2){ ax = axes[0]; ay = axes[1]; }
    if (Math.abs(ax) < 0.01 && Math.abs(ay) < 0.01 && axes.length >= 4){ ax = axes[2]; ay = axes[3]; }

    const dz = 0.15;
    if (Math.abs(ax) < dz) ax = 0;
    if (Math.abs(ay) < dz) ay = 0;

    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    camDir.y = 0; camDir.normalize();
    const right = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0,1,0)).normalize();

    root.position.add(camDir.clone().multiplyScalar(-ay * moveSpeed));
    root.position.add(right.clone().multiplyScalar(ax * moveSpeed));
    break;
  }
}

/* =============================
   Resize + Loop
============================= */
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

let frame = 0;

renderer.setAnimationLoop(()=>{
  if (!renderer.xr.isPresenting) controls.update();

  applyJoystickMove();
  updateScale();

  // ✅ Plug барьж байгаагүй үед: magnet + snap (PlugPort->RazPort)
  applyMagnet();

  // cable update
  const moving = dragging || plugGrabbed || rootGrabbed || scaling || (!connected);
  if (moving) updateCable();
  else { frame++; if (frame % 12 === 0) updateCable(); }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
